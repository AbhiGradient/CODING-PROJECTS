<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random 3x3 Table</title>
    <style>
        table {
            width: 50%
            border-collapse: collapse;
            margin: 20px auto;
            text-align: center;
            font-size: 18px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>Apple</td>
            <td>42</td>
            <td>Blue</td>
        </tr>
        <tr>
            <td>Dog</td>
            <td>99</td>
            <td>Moon</td>
        </tr>
        <tr>
            <td>Sun</td>
            <td>17</td>
            <td>Orange</td>
        </tr>
    </table>
</body>
</html>
